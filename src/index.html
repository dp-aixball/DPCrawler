<!DOCTYPE html>
<html lang="zh-CN" style="background:#0f172a">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    // Apply theme background before any rendering to prevent white flash
    (function(){
      var t = localStorage.getItem('dp-theme') || 'auto';
      var light = t === 'light' || (t === 'auto' && window.matchMedia('(prefers-color-scheme: light)').matches);
      document.documentElement.style.background = light ? '#e2e8f0' : '#0f172a';
      document.documentElement.setAttribute('data-theme', light ? 'light' : 'dark');
    })();
  </script>
  <title>DPCrawler - RAG知识爬虫</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/file-icon-vectors@1.0.0/dist/file-icon-classic.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    
    <div class="main">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <img src="favicon.png" alt="DPCrawler" width="32" height="32">
          <div>DPCrawler</div>
        </div>
        <div class="section">
          <div class="section-title">目标 URL</div>
          <input type="text" id="urls" placeholder="输入目标网站URL">
        </div>
        
        <div class="section">
          <div class="section-title">文件扩展名</div>
          <div class="extensions" id="extensions">
            <label><input type="checkbox" value=".pdf" checked> .pdf</label>
            <label><input type="checkbox" value=".doc" checked> .doc</label>
            <label><input type="checkbox" value=".docx" checked> .docx</label>
            <label><input type="checkbox" value=".xls" checked> .xls</label>
            <label><input type="checkbox" value=".xlsx" checked> .xlsx</label>
            <label><input type="checkbox" value=".ppt" checked> .ppt</label>
            <label><input type="checkbox" value=".pptx" checked> .pptx</label>
            <label><input type="checkbox" value=".csv" checked> .csv</label>
          </div>
        </div>
        
        <div class="section">
          <div class="section-title">存储设置</div>
          <label>输出目录</label>
          <div class="input-row">
            <input type="text" id="outputDir" value="./output">
            <button type="button" id="browseDirBtn" class="icon-btn" title="选择目录"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></button>
          </div>
          <label>内容格式</label>
          <select id="contentFormat">
            <option value="markdown" selected>Markdown</option>
            <option value="json">JSON</option>
            <option value="txt">纯文本</option>
          </select>
          <label>界面主题</label>
          <select id="themeSelect">
            <option value="auto" selected>自动</option>
            <option value="dark">深色</option>
            <option value="light">浅色</option>
          </select>
        </div>
        
        <div class="section">
          <div class="section-title">爬取策略</div>
          <label>请求间隔</label>
          <select id="delay">
            <option value="0">无延迟</option>
            <option value="0.1">100ms</option>
            <option value="0.2">200ms</option>
            <option value="0.3">300ms</option>
            <option value="0.5" selected>500ms</option>
            <option value="0.8">800ms</option>
            <option value="1">1s</option>
            <option value="2">2s</option>
          </select>
          <label>最大深度</label>
          <select id="maxDepth">
            <option value="1" selected>1 层</option>
            <option value="2">2 层</option>
            <option value="3">3 层</option>
            <option value="5">5 层</option>
            <option value="999">不限制</option>
          </select>
          <label>最早年度</label>
          <select id="minYear"></select>
        </div>

        <div class="section" style="flex:1;min-height:0;display:flex;flex-direction:column">
          <div class="section-title">已爬取站点</div>
          <div class="site-list" id="siteList">
            <div class="site-item empty">暂无站点</div>
          </div>
        </div>
      </aside>
      
      <main class="content">
        <div class="topbar">
          <h2>爬取控制</h2>
          <div class="action-buttons">
            <button class="btn btn-secondary" id="preCrawlBtn">全站预爬</button>
            <button class="btn btn-primary" id="startBtn">开始爬取</button>
            <button class="btn btn-secondary" id="stopBtn" disabled>停止</button>
            <button class="btn btn-danger" id="clearBtn">清空结果</button>
          </div>
        </div>
        
        <div class="progress" id="progressSection">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-text" id="progressText">准备就绪</div>
        </div>
        
        <div class="tabs">
          <button class="tab active" data-tab="logs">日志</button>
          <button class="tab" data-tab="files">文件列表</button>
          <button class="tab" data-tab="result">结果</button>
        </div>
        
        <div class="tab-content active" id="logs">
          <div class="log-container" id="logContainer"><span class="log-info">等待开始爬取...</span></div>
        </div>
        
        <div class="tab-content" id="files">
          <div class="files-panel">
            <div class="file-list" id="fileList"><div class="file-item"><span>暂无文件</span></div></div>
            <div class="panel-resizer" id="panelResizer"></div>
            <div class="preview-panel" id="previewPanel">
              <div class="preview-header">
                <span id="previewTitle">选择文件预览</span>

              </div>
              <div class="preview-content" id="previewContent">单击左侧文件即可预览内容</div>
            </div>
          </div>
        </div>
        
        <div class="tab-content" id="result">
          <div class="result-cards">
            <div class="result-card total"><div class="count" id="totalCount">0</div><div class="label">总计</div></div>
            <div class="result-card new"><div class="count" id="newCount">0</div><div class="label">新增</div></div>
            <div class="result-card updated"><div class="count" id="updatedCount">0</div><div class="label">更新</div></div>
            <div class="result-card unchanged"><div class="count" id="unchangedCount">0</div><div class="label">未变</div></div>
            <div class="result-card errors"><div class="count" id="errorCount">0</div><div class="label">错误</div></div>
          </div>
        </div>
      </main>
    </div>
    <footer class="footer">
      <div class="status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">就绪</span>
      </div>
      <span id="aboutBtn" title="关于" style="cursor:pointer;opacity:0.5;font-size:14px;transition:opacity 0.15s" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'">ℹ️</span>
    </footer>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
