name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Rust
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Python + sidecar
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Python venv and dependencies
        shell: bash
        run: |
          python -m venv .venv
          if [ "$RUNNER_OS" == "Windows" ]; then
            .venv/Scripts/pip install -r python/requirements.txt pyinstaller -q
          else
            .venv/bin/pip install -r python/requirements.txt pyinstaller -q
          fi

      # Install npm dependencies
      - run: npm ci || npm install

      # Auto-update version from git tag
      - name: Update version from tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}  # strip 'v' prefix
          echo "Setting version to: $VERSION"
          if [ "$(uname)" == "Darwin" ]; then
            # Update tauri.conf.json
            sed -i "" "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
            # Update Cargo.toml
            sed -i "" "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          else
            # Update tauri.conf.json
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
            # Update Cargo.toml
            sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
          fi
          # Verify
          echo "tauri.conf.json: $(grep version src-tauri/tauri.conf.json | head -1)"
          echo "Cargo.toml: $(grep '^version' src-tauri/Cargo.toml)"

      # Build Tauri app (beforeBuildCommand handles sidecar)
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DPCrawler ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: Setup musl toolchain for CentOS compatibility
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl

      # Build and package headless server
      - name: Build Headless Server
        working-directory: src-tauri
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            export CC_x86_64_unknown_linux_musl=musl-gcc
            export CXX_x86_64_unknown_linux_musl=g++
            cargo build --release --bin dpc_search_server --no-default-features --target x86_64-unknown-linux-musl
          else
            cargo build --release --bin dpc_search_server --no-default-features --target ${{ matrix.target }}
          fi

      - name: Package Headless Server
        shell: bash
        run: |
          mkdir -p dpc_search_server_pkg
          # On Windows, binary is .exe
          if [ "$RUNNER_OS" == "Windows" ]; then
            cp src-tauri/target/${{ matrix.target }}/release/dpc_search_server.exe dpc_search_server_pkg/
          elif [ "$RUNNER_OS" == "Linux" ]; then
            cp src-tauri/target/x86_64-unknown-linux-musl/release/dpc_search_server dpc_search_server_pkg/
          else
            cp src-tauri/target/${{ matrix.target }}/release/dpc_search_server dpc_search_server_pkg/
          fi
          cp dpc_search_server.html dpc_search_server_pkg/
          if [ -f "README_DEPLOY.md" ]; then
            cp README_DEPLOY.md dpc_search_server_pkg/
          elif [ -f "../README_DEPLOY.md" ]; then
            cp ../README_DEPLOY.md dpc_search_server_pkg/
          fi
          
          # Create zip
          if [ "$RUNNER_OS" == "Windows" ]; then
            7z a dpc_search_server-${{ matrix.target }}.zip ./dpc_search_server_pkg/*
          else
            cd dpc_search_server_pkg && zip -r ../dpc_search_server-${{ matrix.target }}.zip ./* && cd ..
          fi

      - name: Upload Headless Server to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dpc_search_server-${{ matrix.target }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
